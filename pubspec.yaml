name: govision
description: GoVision app
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.7.2

dependencies:
  bloc: ^9.0.0
  cached_network_image: ^3.4.1
  camera: ^0.11.1
  connectivity_plus: ^6.1.4
  dio: ^5.8.0+1
  envied: ^1.1.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_hooks: ^0.21.2
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.1.0
  flutter_tts: ^4.2.2
  freezed_annotation: ^2.4.4
  get_it: ^8.0.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  logger: ^2.5.0
  lottie: ^3.3.1
  page_transition: ^2.2.1
  path_provider: ^2.1.5
  speech_to_text: ^7.0.0
  tflite_flutter: ^0.11.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.15
  envied_generator: ^1.1.1
  flutter_gen_runner: ^5.10.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  assets:
    - assets/icons/
    - assets/illustrations/
    - assets/images/
    - assets/json/
    - assets/lottie/
  uses-material-design: true
  generate: true

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true
    lottie: true
